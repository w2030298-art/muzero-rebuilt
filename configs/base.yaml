# Base configuration — common defaults for all environments
project:
  name: muzero
  seed: 0
  output_dir: runs

algorithm:
  name: muzero
  use_value_prefix: false
  use_consistency_loss: false
  use_reanalyze: false
  num_players: 1

network:
  type: mlp
  hidden_size: 128
  num_blocks: 2
  support_size: 10

search:
  num_simulations: 25
  pb_c_base: 19652
  pb_c_init: 1.25
  discount: 0.997
  dirichlet_alpha: 0.25
  root_exploration_fraction: 0.25
  temperature: 1.0
  action_sampler_type: discrete
  num_sampled_actions: 16

training:
  batch_size: 64
  max_steps: 1000
  learning_rate: 0.001
  weight_decay: 0.0001
  unroll_steps: 5
  td_steps: 10
  gradient_accumulation_steps: 1
  precision: fp32
  compile_model: false

replay:
  capacity: 50000
  prioritized: true
  alpha: 0.6
  beta: 0.4

execution:
  backend: local
  device: cpu
  num_self_play_workers: 1
  num_envs_per_worker: 1
  inference_batch_size: 16

checkpoint:
  save_interval_steps: 1000
  keep_last: 5
  resume_path: null

logging:
  tensorboard: true
  log_interval_steps: 100
