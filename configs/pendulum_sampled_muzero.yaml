# Pendulum-v1 with Sampled MuZero (continuous action space)
project:
  name: pendulum_sampled_muzero
  seed: 0

environment:
  type: continuous_control
  id: Pendulum-v1
  max_episode_steps: 200

algorithm:
  name: sampled_muzero
  num_players: 1

network:
  type: mlp
  hidden_size: 128
  support_size: 10

search:
  num_simulations: 25
  action_sampler_type: continuous
  num_sampled_actions: 16
